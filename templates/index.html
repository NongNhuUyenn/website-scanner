<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công cụ Quét Bảo Mật Website</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: #1e293b;
            border-radius: 16px;
            padding: 48px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #38bdf8;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 32px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #cbd5e1;
        }
        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #e2e8f0;
            font-size: 15px;
            margin-bottom: 16px;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: #38bdf8;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #0ea5e9;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #0284c7; }
        button:disabled { background: #334155; cursor: not-allowed; }

        .progress-box {
            display: none;
            margin-top: 24px;
            background: #0f172a;
            border-radius: 10px;
            padding: 20px;
        }
        .progress-label {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 10px;
        }
        .progress-bar-wrap {
            background: #1e293b;
            border-radius: 999px;
            height: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .progress-bar {
            height: 100%;
            background: #38bdf8;
            border-radius: 999px;
            transition: width 0.4s ease;
            width: 0%;
        }
        .progress-step {
            font-size: 13px;
            color: #38bdf8;
        }
        .error-box {
            display: none;
            margin-top: 16px;
            background: #450a0a;
            border: 1px solid #ef4444;
            border-radius: 8px;
            padding: 14px;
            color: #fca5a5;
            font-size: 14px;
        }
        .note {
            margin-top: 24px;
            font-size: 12px;
            color: #475569;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Công cụ Quét Bảo Mật Website</h1>
    <p class="subtitle"></p>

    <label for="url">Địa chỉ website cần quét</label>
    <input type="text" id="url" placeholder="http://localhost/dvwa" value="http://localhost/dvwa">

    <button id="btn-quet" onclick="batDauQue()">Bắt đầu quét</button>

    <div class="progress-box" id="progress-box">
        <div class="progress-label">Tiến độ quét</div>
        <div class="progress-bar-wrap">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="progress-step" id="progress-step">Đang khởi động...</div>
    </div>

    <div class="error-box" id="error-box"></div>

    <p class="note"></p>
</div>

<script>
    let interval = null;

    function batDauQue() {
        const url = document.getElementById("url").value.trim();
        if (!url) { hienLoi("Vui lòng nhập địa chỉ website"); return; }

        document.getElementById("btn-quet").disabled = true;
        document.getElementById("progress-box").style.display = "block";
        document.getElementById("error-box").style.display = "none";

        fetch("/quet", {
            method: "POST",
            headers: {"Content-Type": "application/x-www-form-urlencoded"},
            body: "url=" + encodeURIComponent(url)
        })
        .then(r => r.json())
        .then(data => {
            if (data.loi) { hienLoi(data.loi); return; }
            interval = setInterval(kiemTraTienDo, 2000);
        })
        .catch(() => hienLoi("Không kết nối được server"));
    }

    function kiemTraTienDo() {
        fetch("/tien-do")
        .then(r => r.json())
        .then(data => {
            document.getElementById("progress-bar").style.width = data.tien_do + "%";
            document.getElementById("progress-step").textContent = data.buoc;

            if (data.loi) {
                clearInterval(interval);
                hienLoi(data.loi);
                document.getElementById("btn-quet").disabled = false;
            }
            if (data.xong) {
                clearInterval(interval);
                window.location.href = "/ket-qua";
            }
        });
    }

    function hienLoi(msg) {
        const box = document.getElementById("error-box");
        box.textContent = "Lỗi: " + msg;
        box.style.display = "block";
        document.getElementById("btn-quet").disabled = false;
    }
</script>
</body>
</html>
